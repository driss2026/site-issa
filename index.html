<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Issa - Le Site Officiel (Gênant)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #4285F4;
      color: white;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }
    .search-bar {
      margin: 40px;
    }
    input {
      width: 60%;
      padding: 10px;
      font-size: 18px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      background-color: #34A853;
      color: white;
      border: none;
      cursor: pointer;
    }
    .results {
      margin-top: 30px;
      font-size: 20px;
      color: #333;
    }
  </style>
</head>
<body>

<header>Issa Search 😭</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Rechercher Issa...">
  <button onclick="searchIssa()">Rechercher</button>
</div>

<div class="results" id="results"></div>

<script>
function searchIssa() {
  const input = document.getElementById("searchInput").value.toLowerCase();
  const results = document.getElementById("results");

  if (input.includes("issa")) {
    results.innerHTML = "Résultat : Issa est officiellement trop gênant 😭💀";
  } else {
    results.innerHTML = "Aucun résultat… mais Issa reste gênant.";
  }
}
</script>

</body>
</html>
